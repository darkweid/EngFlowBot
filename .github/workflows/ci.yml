name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  static-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: infra/requirements/dev.txt

      - name: Cache pre-commit environments
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-py3.13-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r infra/requirements/dev.txt

      - name: Create CI env file
        run: cp .env.example .env

      - name: Compile Python modules
        run: |
          python -m compileall \
            bot \
            tests

      - name: Run pre-commit
        run: make lint

  migration-heads:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: infra/requirements/dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r infra/requirements/dev.txt

      - name: Create CI env file
        run: cp .env.example .env

      - name: Check migration HEADs
        run: |
          export PYTHONPATH="$PWD"
          echo "--- Alembic heads ---"
          alembic heads
          HEADS_COUNT="$(alembic heads | wc -l)"
          if [ "$HEADS_COUNT" -gt 1 ]; then
            echo "ERROR: Multiple Alembic heads detected ($HEADS_COUNT)."
            exit 1
          fi

  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: infra/requirements/dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r infra/requirements/dev.txt

      - name: Create CI env file
        run: cp .env.example .env

      - name: Run tests with coverage
        run: make test-cov

      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2.3.6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          format: cobertura
          file: coverage.xml

  docker-build:
    runs-on: ubuntu-latest
    needs: [static-checks, migration-heads, tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -f infra/docker/Dockerfile -t engflowbot:ci .
