name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: infra/requirements/dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r infra/requirements/dev.txt

      - name: Create CI env file
        run: cp .env.example .env

      - name: Compile Python modules
        run: |
          python -m compileall \
            bot \
            tests

      - name: Check migration HEADs
        run: |
          export PYTHONPATH="$PWD"
          echo "--- Alembic heads ---"
          alembic heads
          HEADS_COUNT="$(alembic heads | wc -l)"
          if [ "$HEADS_COUNT" -gt 1 ]; then
            echo "ERROR: Multiple Alembic heads detected ($HEADS_COUNT)."
            exit 1
          fi

      - name: Run pre-commit
        run: make lint

      - name: Build Docker image
        run: docker build -f infra/docker/Dockerfile -t engflowbot:ci .
