name: engflowbot

services:
  bot:
    container_name: engflowbot-bot
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile
    image: engflowbot:latest
    restart: always
    env_file:
      - ${APP_ENV_FILE:?APP_ENV_FILE is required}
    depends_on:
      postgres:
        condition: service_healthy
      redis_fsm:
        condition: service_healthy
    volumes:
      - bot-logs:/app/logs
    networks:
      - bot-network

  redis_fsm:
    container_name: engflowbot-redis-fsm
    image: redis:7.4
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis-data:/data
    networks:
      - bot-network

  postgres:
    container_name: engflowbot-postgres
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 3s
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - bot-network

volumes:
  bot-logs:
    name: engflowbot-logs
  redis-data:
    name: engflowbot-redis-data
  postgres-data:
    name: engflowbot-postgres-data

networks:
  bot-network:
    name: engflowbot-network
    driver: bridge
